<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* No-Scroll Lock */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 15px; background-color: #121212; color: #fff; height: 100vh; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;}
        h1 { margin: 0; font-size: 22px; color: #4dabf7; }
        .btn-back { background-color: #333; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-back:hover { background-color: #444; }
        .btn-danger { background-color: #a4262c; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-danger:hover { background-color: #8c1d22; }

        /* Dashboard Grid Layout */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        
        /* Summary Cards */
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .card h3 { margin: 0; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;}
        .card .value { font-size: 32px; font-weight: bold; margin-top: 5px; color: #fff;}
        .text-danger { color: #ff6b6b !important; }

        /* Chart Containers */
        .chart-box { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; min-height: 0;}
        .chart-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #ddd; text-align: center;}
        .canvas-container { flex-grow: 1; position: relative; width: 100%; height: 100%;}

        /* Top Suspicious Table */
        .table-box { grid-column: span 1; overflow: hidden; display: flex; flex-direction: column;}
        table { width: 100%; border-collapse: collapse; text-align: left; flex-grow: 1;}
        th, td { padding: 10px; border-bottom: 1px solid #333; font-size: 14px;}
        th { color: #aaa; font-weight: normal; }
        td { color: #fff; }
        .high-risk { color: #ff6b6b; font-weight: bold;}
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 Data Intelligence & Stats</h1>
        <div>
            <button class="btn-back" onclick="window.history.back()">🔙 Back</button>
            <button class="btn-danger" onclick="cancelAndRestart()" id="cancelBtn">🗑️ Clear Data</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Total Transactions Analyzed</h3>
            <div class="value" id="valTotal">--</div>
        </div>
        <div class="card">
            <h3>Flagged as Fraud</h3>
            <div class="value text-danger" id="valFrauds">--</div>
        </div>
        <div class="card">
            <h3>Overall Fraud Rate</h3>
            <div class="value text-danger" id="valPct">--%</div>
        </div>

        <div class="chart-box">
            <h3>Risk Distribution</h3>
            <div class="canvas-container">
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>

        <div class="chart-box">
            <h3>Probability Spread</h3>
            <div class="canvas-container">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="chart-box table-box">
            <h3>⚠️ Top Suspicious Transactions</h3>
            <table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Probability</th>
                    </tr>
                </thead>
                <tbody id="susTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch(`/api/stats_data`);
                const data = await response.json();
                
                if (data.error) {
                    window.location.href = '/';
                    return;
                }

                // 1. Update Cards
                document.getElementById('valTotal').textContent = data.total.toLocaleString();
                document.getElementById('valFrauds').textContent = data.frauds.toLocaleString();
                document.getElementById('valPct').textContent = data.fraud_pct + '%';

                // 2. Populate Table
                const tbody = document.getElementById('susTableBody');
                data.top_suspicious.forEach(item => {
                    const row = `<tr>
                        <td>${item.transaction_id}</td>
                        <td class="high-risk">${item.fraud_probability.toFixed(2)}%</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });

                // 3. Render Doughnut Chart (Safe vs Fraud)
                const safeCount = data.total - data.frauds;
                new Chart(document.getElementById('doughnutChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Safe', 'Fraud'],
                        datasets: [{
                            data: [safeCount, data.frauds],
                            backgroundColor: ['#2b8a3e', '#e03131'],
                            borderWidth: 0
                        }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels:{color:'#fff'} } } }
                });

                // 4. Render Bar Chart (Distribution)
                new Chart(document.getElementById('barChart'), {
                    type: 'bar',
                    data: {
                        labels: data.dist_labels,
                        datasets: [{
                            label: 'Number of Transactions',
                            data: data.dist_counts,
                            backgroundColor: '#4dabf7',
                            borderRadius: 4
                        }]
                    },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } },
                        scales: { 
                            y: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
                            x: { ticks: { color: '#aaa' }, grid: { display: false } }
                        }
                    }
                });

            } catch (err) {
                console.error("Failed to load stats:", err);
            }
        }

        async function cancelAndRestart() {
            const btn = document.getElementById('cancelBtn');
            btn.disabled = true;
            btn.textContent = '🗑️ Deleting...';
            try {
                await fetch('/cancel_session', { method: 'POST' });
                window.location.href = '/';
            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }

        loadStats();
    </script>
</body>
</html>
